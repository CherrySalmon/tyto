---
# Backend secrets configuration
# This file is copied to secrets.yml by `rake setup`
#
# Required setup:
#   1. Generate JWT_KEY:                    bundle exec rake generate:jwt_key
#   2. Generate LOCAL_STORAGE_SIGNING_KEY:  bundle exec rake generate:local_storage_signing_key
#      Copy the base64 output below for each environment
#   3. Set ADMIN_EMAIL to your Google account email (for admin access)
#
# File storage (Slice 3):
#   - development/test use the LocalGateway (filesystem). Only LOCAL_STORAGE_*
#     entries are required. S3_* entries are unused.
#   - production uses the AWS Gateway. Only S3_* entries are required.
#     LOCAL_STORAGE_* entries are unused.

development:
  DATABASE_URL: sqlite://backend_app/db/store/development.db
  JWT_KEY: <run: bundle exec rake generate:jwt_key>
  ADMIN_EMAIL: your-email@example.com
  LOCAL_STORAGE_ROOT: backend_app/tmp/local_storage
  LOCAL_STORAGE_SIGNING_KEY: <run: bundle exec rake generate:local_storage_signing_key>
  LOCAL_STORAGE_BASE_URL: http://localhost:9292

test:
  DATABASE_URL: sqlite://backend_app/db/store/test.db
  JWT_KEY: <run: bundle exec rake generate:jwt_key>
  ADMIN_EMAIL: test@example.com
  LOCAL_STORAGE_ROOT: backend_app/tmp/local_storage_test
  LOCAL_STORAGE_SIGNING_KEY: <run: bundle exec rake generate:local_storage_signing_key>
  LOCAL_STORAGE_BASE_URL: http://localhost:9292

production:
  DATABASE_URL: postgres://user:password@host:port/database
  JWT_KEY: <set via environment variable>
  ADMIN_EMAIL: <set via environment variable>
  S3_BUCKET: <set via environment variable>
  S3_REGION: <set via environment variable>
  S3_ACCESS_KEY_ID: <set via environment variable>
  S3_SECRET_ACCESS_KEY: <set via environment variable>
